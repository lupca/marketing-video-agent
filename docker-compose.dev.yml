# Docker Compose for DEV environment
# Only infrastructure services run in Docker.
# Workers, API, and Frontend run on the host machine for fast iteration.

services:
  db:
    image: postgres:15-alpine
    container_name: video_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: video_creator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: video_redis
    ports:
      - "6379:6379"
    restart: always

  minio:
    image: minio/minio:latest
    container_name: video_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: always

volumes:
  postgres_data:
  minio_data:
