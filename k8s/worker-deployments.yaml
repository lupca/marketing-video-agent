---
# Worker Review
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-review
  namespace: video-creator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-review
  template:
    metadata:
      labels:
        app: worker-review
    spec:
      containers:
        - name: worker-review
          image: marketing-video-agent:latest
          imagePullPolicy: IfNotPresent
          workingDir: /app/worker_review
          command: ["python", "-m", "celery_worker"]
          envFrom:
            - configMapRef:
                name: video-config
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: video-config
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: video-config
                  key: REDIS_URL
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: video-config
                  key: MINIO_ENDPOINT
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: video-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: video-secrets
                  key: MINIO_SECRET_KEY
            - name: MINIO_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: video-config
                  key: MINIO_BUCKET_NAME
            - name: HF_HOME
              valueFrom:
                configMapKeyRef:
                  name: video-config
                  key: HF_HOME
            - name: TORCH_HOME
              valueFrom:
                configMapKeyRef:
                  name: video-config
                  key: TORCH_HOME
            - name: XDG_CACHE_HOME
              valueFrom:
                configMapKeyRef:
                  name: video-config
                  key: XDG_CACHE_HOME
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          restartPolicy: Always
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: models-pvc
