apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: video-creator-ingress
  namespace: video-creator
  annotations:
    kubernetes.io/ingress.class: nginx
  spec:
    rules:
      - host: api.example.com
        http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: api
                  port:
                    number: 8000
      - host: app.example.com
        http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: frontend
                  port:
                    number: 80
      - host: minio.example.com
        http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: minio
                  port:
                    number: 9000
