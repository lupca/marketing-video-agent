# Helm values for production deployment
# Usage: helm install video-creator ./helm -f helm/values.yaml

replicaCount: 3

image:
  registry: docker.io
  repository: your-username/marketing-video-agent
  tag: latest
  pullPolicy: IfNotPresent

api:
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

workers:
  review:
    replicas: 1
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  unbox:
    replicas: 1
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  slideshow:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  download:
    replicas: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  promotion:
    replicas: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

postgresql:
  enabled: true
  primary:
    persistence:
      size: 10Gi
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

redis:
  enabled: true
  master:
    persistence:
      size: 5Gi

minio:
  enabled: true
  persistence:
    size: 50Gi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: video-creator-tls
      hosts:
        - api.example.com
        - app.example.com

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

monitoring:
  enabled: true
  prometheus:
    enabled: true
  grafana:
    enabled: true

persistence:
  models:
    size: 30Gi
    storageClassName: fast-ssd
